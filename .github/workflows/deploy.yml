# Despliegue automático: al hacer commit en main (lo hace Decap al "Publicar"),
# se reconstruye el sitio con Eleventy y se sube por FTP al servidor de 3L Systems,
# SIEMPRE dentro de demos/<slug> (misma regla que motor/deploy/deploy.ps1).
name: build-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Evita despliegues solapados si el cliente guarda varias veces seguidas.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# Destino en el servidor de 3L Systems. SIEMPRE bajo demos/, NUNCA en la raíz.
env:
  SERVER_DIR: /demos/pacacervera-cms/

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run build   # eleventy -> ./_site

      # Salvaguarda (igual que deploy.ps1): aborta si el destino no está bajo demos/.
      - name: Salvaguarda — destino siempre bajo demos/
        run: |
          case "$SERVER_DIR" in
            /demos/*) echo "Destino OK: $SERVER_DIR" ;;
            *) echo "ABORTADO: el destino debe estar bajo /demos/ (era: $SERVER_DIR)"; exit 1 ;;
          esac

      - name: Deploy por FTP a $SERVER_DIR en el servidor de 3L Systems
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./_site/
          server-dir: ${{ env.SERVER_DIR }}
          # Conserva ficheros ajenos al build si los hubiera:
          dangerous-clean-slate: false
