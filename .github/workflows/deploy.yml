# Despliegue automático: al hacer commit en main (lo hace Decap al "Publicar"),
# se reconstruye el sitio con Eleventy y se sube por FTP al servidor de 3L Systems,
# SIEMPRE dentro de demos/<slug> (misma regla que motor/deploy/deploy.ps1).
name: build-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Evita despliegues solapados si el cliente guarda varias veces seguidas.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# Destino en el servidor de 3L Systems. SIEMPRE bajo demos/, NUNCA en la raíz.
env:
  SERVER_DIR: /demos/pacacervera-cms/

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run build   # eleventy -> ./_site

      # Salvaguarda (igual que deploy.ps1): aborta si el destino no está bajo demos/.
      - name: Salvaguarda — destino siempre bajo demos/
        run: |
          case "$SERVER_DIR" in
            /demos/*) echo "Destino OK: $SERVER_DIR" ;;
            *) echo "ABORTADO: el destino debe estar bajo /demos/ (era: $SERVER_DIR)"; exit 1 ;;
          esac

      # FTPS explícito aceptando el certificado del servidor (igual que el motor
      # deploy.ps1, que usa AcceptAnyTlsCertificate). Por eso usamos lftp y no
      # una acción que valida el certificado y rechazaría la conexión.
      - name: Deploy por FTPS (lftp) a demos/ en el servidor de 3L Systems
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -y >/dev/null && sudo apt-get install -y lftp >/dev/null
          lftp -c "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate no;
            set net:max-retries 2;
            set net:timeout 20;
            open -u '$FTP_USERNAME','$FTP_PASSWORD' '$FTP_SERVER';
            mirror -R --verbose ./_site/ '$SERVER_DIR';
          "
